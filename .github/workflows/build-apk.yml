name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# GOTOOLCHAIN=local â€” stops Go from trying to download the non-existent Go 1.26
# declared in go.mod. Go 1.25 (installed below) is used for everything.
env:
  GOTOOLCHAIN: local

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # â”€â”€ 1. Checkout â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - uses: actions/checkout@v4

      - name: Set up Python for icon generation
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install icon generation tooling
        run: python -m pip install --upgrade -r requirements.txt

      - name: Apply app icon assets
        run: python scripts/apply_app_icon.py

      - name: Verify generated app icon assets
        run: |
          test -s android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          test -s android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
          test -s android/app/src/main/res/drawable-nodpi/whitedns_logo.png
          grep -q 'android:icon="@mipmap/ic_launcher"' android/app/src/main/AndroidManifest.xml
          grep -q 'android:roundIcon="@mipmap/ic_launcher_round"' android/app/src/main/AndroidManifest.xml

      # â”€â”€ 2. Go 1.25 â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: go.sum

      # â”€â”€ 3. JDK 17 â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # â”€â”€ 4. Android SDK (sets ANDROID_HOME in the environment) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          # Keep the setup step lean. The action's default "tools" package can
          # pull the Android Emulator, which is unnecessary for assembling an APK
          # and has intermittently failed to unzip on GitHub-hosted runners.
          packages: platform-tools

      # â”€â”€ 5. NDK r26 â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Install NDK r26
        run: |
          sdkmanager --install "ndk;26.3.11579264" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.3.11579264" >> $GITHUB_ENV

      # â”€â”€ 6. gomobile â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: gomobile init
        run: gomobile init

      # â”€â”€ 7. Register gomobile as a tool dep (required by Go 1.25+) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Add gomobile tool dependency
        run: go get -tool golang.org/x/mobile/cmd/gobind

      # â”€â”€ 8. Build whitescan.aar â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Build .aar (Go â†’ Android library)
        run: |
          mkdir -p android/app/libs
          gomobile bind \
            -target=android/arm,android/arm64,android/386,android/amd64 \
            -androidapi 21 \
            -javapkg com.whitescan.engine \
            -o android/app/libs/whitescan.aar \
            ./mobile

      # â”€â”€ 9. Gradle 8.7 + build APK â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Prepare Tajirax release signing key
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.TAJIRAX_KEYSTORE_BASE64 }}
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.TAJIRAX_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.TAJIRAX_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.TAJIRAX_KEY_PASSWORD }}
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/tajirax-release.jks"
          KEYSTORE_PASSWORD="${SIGNING_KEYSTORE_PASSWORD:-tajirax-release-password}"
          KEY_ALIAS="${SIGNING_KEY_ALIAS:-tajirax}"
          KEY_PASSWORD="${SIGNING_KEY_PASSWORD:-$KEYSTORE_PASSWORD}"

          if [ -n "$SIGNING_KEYSTORE_BASE64" ] && [ -n "$SIGNING_KEYSTORE_PASSWORD" ]; then
            echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
            echo "Using TAJIRAX_KEYSTORE_BASE64 release signing key."
          else
            echo "TAJIRAX signing secrets are missing; generating a temporary Tajirax release key for this CI run."
            echo "For Play Store updates, add TAJIRAX_KEYSTORE_BASE64 and TAJIRAX_KEYSTORE_PASSWORD secrets so every release uses the same key."
            keytool -genkeypair \
              -keystore "$KEYSTORE_PATH" \
              -storepass "$KEYSTORE_PASSWORD" \
              -alias "$KEY_ALIAS" \
              -keypass "$KEY_PASSWORD" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=tajirax, OU=WhiteDNS, O=tajirax, L=Tehran, ST=Tehran, C=IR"
          fi
          echo "SIGNING_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "SIGNING_KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "SIGNING_KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
          echo "SIGNING_KEY_PASSWORD=$KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Build signed release APKs
        working-directory: android
        run: gradle assembleRelease bundleRelease

      - name: Collect release artifacts
        run: |
          mkdir -p android/release-artifacts
          for apk in android/app/build/outputs/apk/release/*.apk; do
            name="$(basename "$apk")"
            cp "$apk" "android/release-artifacts/WhiteDNS-IP-Scanner-${name#app-}"
          done
          cp android/app/build/outputs/bundle/release/app-release.aab \
            android/release-artifacts/WhiteDNS-IP-Scanner-release.aab

      # â”€â”€ 10. Upload APK artifact (30-day download in Actions tab) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WhiteDNS-IP-Scanner-${{ github.sha }}-signed-release
          path: android/release-artifacts/*
          retention-days: 30

      # â”€â”€ 11. GitHub Release (only on v* tags) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      # Only publish a Release on real tag pushes. On a manual workflow_dispatch,
      # github.ref_name is the branch ("main") â€” creating a tag from it collides
      # with the branch and breaks `git push`. Guard against that.
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "WhiteDNS ${{ github.ref_name }}"
          body: "APK build for ${{ github.ref_name }} (${{ github.sha }})"
          files: android/release-artifacts/*
          fail_on_unmatched_files: false

